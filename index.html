/* ---------- Plus-Held (erstes Rechnen) ---------- */
const ADD_OBJECTS = ["🍎","🍌","🍓","⭐","🐟","🌸","⚽","🚗","🐶","🐱","🐠","🌷"];
function makeAdditionRound(n){
  const q = [];
  const used = [];
  for (let i = 0; i < n; i++){
    const maxSum = Math.min(5 + i, 10);                  // wächst über die Runde bis 10
    const minSum = Math.min(3 + i, maxSum);              // Untergrenze wächst mit -> mehr Abwechslung
    let sum, tries = 0;
    do { sum = randInt(minSum, maxSum); tries++; } while (used.includes(sum) && tries < 8);
    used.push(sum);
    const a = randInt(Math.max(1, sum - 6), Math.min(sum - 1, 6));  // beide Summanden 1..6, gut zählbar
    const b = sum - a;
    q.push({ a, b, sum, emoji: pick(ADD_OBJECTS) });
  }
  return q;
}
function renderAddition(item){
  el.ask.innerHTML = `Wie viel ist <b>${item.a} + ${item.b}</b>?`;
  const row = document.createElement("div"); row.className = "summe";
  const g1 = document.createElement("div"); g1.className = "grp";
  const g2 = document.createElement("div"); g2.className = "grp";
  let counted = 0;
  function mkObj(parent){
    const s = document.createElement("span"); s.className = "animal"; s.textContent = item.emoji;
    s.addEventListener("click", () => {
      if (s.classList.contains("counted")) return;
      s.classList.add("counted"); counted++; playBlip(); speak(String(counted));
    });
    parent.appendChild(s);
  }
  for (let i = 0; i < item.a; i++) mkObj(g1);
  for (let i = 0; i < item.b; i++) mkObj(g2);
  const plus = document.createElement("span"); plus.className = "op"; plus.textContent = "+";
  row.appendChild(g1); row.appendChild(plus); row.appendChild(g2);
  el.content.appendChild(row);

  const choices = document.createElement("div"); choices.className = "choices";
  numberChoices(item.sum, item.sum + 2).forEach(num => {
    const b = document.createElement("button");
    b.className = "choice big"; b.textContent = String(num);
    b.addEventListener("click", () => {
      handleAnswer(num === item.sum, b,
        (done) => speak("Richtig! " + item.a + " plus " + item.b + " ist " + item.sum + "!", done));
    });
    choices.appendChild(b);
  });
  el.content.appendChild(choices);
}

/* ---------- Muster-Held (Muster fortsetzen) ---------- */
const PATTERN_SETS = [
  ["🔴","🔵","🟡","🟢"],
  ["🍎","🍌","🍇","🍓"],
  ["🐶","🐱","🐭","🐰"],
  ["⭐","❤️","🔶","🟣"],
  ["🚗","🚌","🚂","✈️"],
];
function makePatternRound(n){
  const q = [];
  const types = ["AB","ABC","AAB","ABB"];
  for (let i = 0; i < n; i++){
    const set = shuffle(pick(PATTERN_SETS));
    const type = pick(types);
    let period, vis;
    if (type === "AB")       { period = [set[0], set[1]];          vis = 5; }  // A B A B ? -> A
    else if (type === "ABC") { period = [set[0], set[1], set[2]];  vis = 6; }  // A B C A B ? -> C
    else if (type === "AAB") { period = [set[0], set[0], set[1]];  vis = 6; }  // A A B A A ? -> B
    else                     { period = [set[0], set[1], set[1]];  vis = 6; }  // A B B A B ? -> B
    const seq = [];
    for (let k = 0; k < vis; k++) seq.push(period[k % period.length]);
    const answer = seq[seq.length - 1];
    const shown = seq.slice(0, seq.length - 1);
    const optsSet = new Set([answer]);
    for (const s of shuffle(set)){ if (optsSet.size >= 3) break; if (s !== answer) optsSet.add(s); }
    q.push({ shown, answer, options: shuffle([...optsSet]) });
  }
  return q;
}
function renderPattern(item){
  el.ask.innerHTML = `Wie geht es <b>weiter</b>?`;
  const row = document.createElement("div"); row.className = "patternrow";
  item.shown.forEach(sym => {
    const c = document.createElement("span"); c.className = "pcell"; c.textContent = sym; row.appendChild(c);
  });
  const slot = document.createElement("span"); slot.className = "pcell pq"; slot.textContent = "?"; row.appendChild(slot);
  el.content.appendChild(row);

  const choices = document.createElement("div"); choices.className = "choices";
  item.options.forEach(sym => {
    const b = document.createElement("button");
    b.className = "choice big emoji"; b.textContent = sym;
    b.addEventListener("click", () => {

    });
    choices.appendChild(b);
  });
  el.content.appendChild(choices);
}

/* ---------- Minus-Held (erstes Subtrahieren) ---------- */
function makeSubtractionRound(n){
  const q = [];
  const used = [];
  for (let i = 0; i < n; i++){
    const maxA = Math.min(4 + i, 10);                    // Minuend wächst 4->10
    const minA = Math.min(3 + i, maxA);
    let a, tries = 0;
    do { a = randInt(minA, maxA); tries++; } while (used.includes(a) && tries < 6);
    used.push(a);
    const b = randInt(1, a - 1);                         // Ergebnis bleibt >= 1
    q.push({ a, b, result: a - b, emoji: pick(ADD_OBJECTS) });
  }
  return q;
}
function renderSubtraction(item){
  el.ask.innerHTML = `Wie viel ist <b>${item.a} − ${item.b}</b>?`;
  const row = document.createElement("div"); row.className = "summe";
  const grp = document.createElement("div"); grp.className = "grp wide";
  const remain = item.a - item.b;
  let counted = 0;
  for (let i = 0; i < item.a; i++){
    const s = document.createElement("span");
    const gone = i >= remain;
    s.className = "mobj" + (gone ? " gone" : "");
    s.textContent = item.emoji;
    if (!gone){

      });

function revealRow(n){
  const zoo = loadZoo();
  let queue = loadQueue();
  let revealed = 0;
  for (let k = 0; k < n; k++){
    const fehlend = ZOO_ANIMALS.filter(a => !zoo[a]);
    if (!fehlend.length) break;                       // alle schon da
    let tier = null;
    while (queue.length && !tier){ const c = queue.shift(); if (!zoo[c]) tier = c; }
    if (!tier) tier = ZOO_FIRST.find(a => !zoo[a] && ZOO_ANIMALS.indexOf(a) !== -1);
    if (!tier) tier = pick(fehlend);
    zoo[tier] = (zoo[tier] || 0) + 1;
    revealed++;
  }
  saveQueue(queue); saveZoo(zoo);
  return revealed;
}

  const zoo = loadZoo();

  sel.forEach(a => { if (ZOO_ANIMALS.indexOf(a) !== -1 && !zoo[a]){ zoo[a] = (zoo[a] || 0) + 1; revealed++; } });

}

function loadStats(){ try { return JSON.parse(localStorage.getItem("lernheld-stats")) || {rounds:{},stars:{},wrong:{}}; } catch (e) { return {rounds:{},stars:{},wrong:{}}; } }
function saveStats(s){ try { localStorage.setItem("lernheld-stats", JSON.stringify(s)); } catch (e) {} }

/* --- Datum/Zeit-Helfer für Heute-Werte, Streak & „zuletzt gespielt" --- */
function dayStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayStr(){ return dayStr(new Date()); }
function yesterdayStr(){ const d = new Date(); d.setDate(d.getDate()-1); return dayStr(d); }
function daysSince(dateStr){
  if (!dateStr) return null;
  const a = new Date(dateStr+"T00:00:00"), b = new Date(todayStr()+"T00:00:00");
  return Math.round((b - a) / 86400000);
}
function ensureToday(s){
  const t = todayStr();
  if (!s.today || s.today.date !== t) s.today = { date:t, rounds:0, stars:0, wrong:0, seconds:0 };
  return s;
}
/* Streak/letzter-Tag aktualisieren, sobald wirklich gespielt wird (eine Antwort gegeben) */
function markPlayedToday(s){
  const t = todayStr();
  if (s.lastDate === t) return;
  s.streak = (s.lastDate === yesterdayStr()) ? (s.streak||0)+1 : 1;
  s.lastDate = t;
}
/* Welches Lern-Item wurde gerade falsch beantwortet? (für die Schwächen-Übersicht) */
function missLabel(){
  try {
    switch (mode){
      case "letters":     return current && current.l;
      case "counting":    return (current && current.count != null) ? ("die "+current.count) : null;
      case "addition":    return current ? (current.a+" + "+current.b) : null;
      case "subtraction": return current ? (current.a+" − "+current.b) : null;
      case "trace":       return (typeof current === "number") ? ("die "+current) : null;
      case "wordtrace":   return (typeof current === "string") ? current : null;
      case "flags":       return current && current.name;
      case "capitals":    return current && current.country;
      case "english":     return current && current.en;
      case "rhyme":       return current && current.word;
      case "sounds":      return current && current.name;
      case "shapes":      return current && (current.type === "color" ? (current.target && current.target.name) : current.target);
      case "reading":     return current && current.w;
      default:            return null;   // memory, pattern -> kein sinnvolles Einzel-Item
    }
  } catch (e){ return null; }
}
function statRound(m, stars){
  const s = ensureToday(loadStats()); s.rounds=s.rounds||{}; s.stars=s.stars||{};
  s.rounds[m]=(s.rounds[m]||0)+1; s.stars[m]=(s.stars[m]||0)+(stars||0);
  s.today.rounds++; s.today.stars += (stars||0);
  markPlayedToday(s); saveStats(s);
}
function statWrong(m){
  const s = ensureToday(loadStats()); s.wrong=s.wrong||{};
  s.wrong[m]=(s.wrong[m]||0)+1; s.today.wrong++;
  const lbl = missLabel();
  if (lbl != null && String(lbl).trim()){ s.miss=s.miss||{}; s.miss[m]=s.miss[m]||{}; const k=String(lbl); s.miss[m][k]=(s.miss[m][k]||0)+1; }
  markPlayedToday(s); saveStats(s);
}
function addPlaySeconds(secs){
  if (!secs || secs <= 0) return;
  const s = ensureToday(loadStats());
  s.today.seconds = (s.today.seconds||0) + secs;
  s.totalSeconds = (s.totalSeconds||0) + secs;
  saveStats(s);
}

function playClockStop(){ playClockFlush(); playClockStart = 0; }
function fmtMinutes(secs){ secs = secs||0; if (secs < 60) return secs < 5 ? "0 Min" : "unter 1 Min"; return Math.round(secs/60) + " Min"; }
function lastPlayedText(s){
  const d = daysSince(s.lastDate);

}

    '<div class="pe-sect">'+rows+
      '<div class="pe-row pe-total"><span>Gesamt</span><span class="pe-n">'+totR+' Runden · '+totS+' ⭐'+totAccHtml+'</span></div>'+
      '<div class="pe-row"><span>⏱️ Spielzeit gesamt</span><span class="pe-n">'+fmtMinutes(s.totalSeconds)+'</span></div>'+
      '<div class="pe-row"><span>🌴 Tiere im Dschungel</span><span class="pe-n">'+coll+' / '+ZOO_ANIMALS.length+'</span></div>'+
    '</div>'+
    weakHtml+
    '<div class="pe-timer"><div class="pe-tlabel">⏰ Spielzeit-Wecker</div>'+
      '<div class="pe-tstatus">'+(e?('Aktiv – noch ca. '+rem+' Min'):'Aus')+'</div>'+
      '<div class="pe-tbtns" id="peTbtns">'+tb+'</div></div>'+
    '<div class="pe-actions"><button class="ghost-btn" id="peReset">Statistik zurücksetzen</button>'+
      '<button class="big-btn" id="peClose">Fertig</button></div></div>'
  );
  document.getElementById("peClose").addEventListener("click", peClose);
  document.getElementById("peReset").addEventListener("click", () => { if (confirm("Statistik wirklich zurücksetzen?")){ try { localStorage.removeItem("lernheld-stats"); } catch (x) {} openParent(); } });
  document.querySelectorAll("#peTbtns .pe-tbtn").forEach(b => b.addEventListener("click", () => { const m = +b.dataset.min; if (m === 0) clearTimer(); else setTimer(m); openParent(); }));
}

function handleAnswer(isCorrect, btn, praiseFn){
  if (locked) return;
  cancelRead();
  if (isCorrect){
    locked = true;
    score++; lightStars();
    btn.classList.add("right");
    [...btn.parentElement.children].forEach(c => { if (c !== btn) c.classList.add("dim"); });
    el.mascot.classList.remove("cheer"); void el.mascot.offsetWidth; el.mascot.classList.add("cheer");
    playCheer(); confettiBurst();
    let done = false;
    const go = () => { if (done) return; done = true; setTimeout(nextQuestion, 600); };
    praiseFn(go);            // weiter, sobald das Lob fertig gesprochen ist
    setTimeout(go, 8000);    // Sicherheitsnetz, falls onend nie feuert
  } else {
    statWrong(mode);
    btn.classList.remove("wrong"); void btn.offsetWidth; btn.classList.add("wrong");
    playWrong();
    if (mode === "english") speakEN(pick(["Try again!", "Almost! Try again.", "Oops! Try another one."]));
    else                    speak(pick(["Versuch es nochmal!", "Probier noch eine!", "Fast! Schau nochmal."]));
  }
}

function winRound(){
  const title = mode === "letters" ? "Buchstaben-Held"
              : mode === "counting" ? "Zähl-Held"
              : mode === "flags" ? "Flaggen-Held"
              : mode === "capitals" ? "Hauptstadt-Held"
              : mode === "english" ? "Englisch-Held"
              : mode === "rhyme" ? "Reim-Held"
              : mode === "memory" ? "Memory-Held"
              : mode === "trace" ? "Mal-Held"
              : mode === "paint" ? "Künstler"
              : mode === "wordtrace" ? "Schreib-Held"
              : mode === "shapes" ? "Farben-Held"
              : mode === "addition" ? "Rechen-Held"
              : mode === "subtraction" ? "Minus-Held"
              : mode === "pattern" ? "Muster-Held"
              : mode === "sounds" ? "Geräusche-Held"
              : mode === "reading" ? "Lese-Held"
              : mode === "maze" ? "Labyrinth-Held"
              : mode === "mazexl" ? "Labyrinth-Profi"
              : mode === "walk" ? "Irrgarten-Held"
              : mode === "search" ? "Such-Held"
              : "Lern-Held";
  el.winText.innerHTML = `Super gemacht!<br>Du bist ein<br>${title}! 🌟`;
  statRound(mode, score);   // Eltern-Statistik: Runde + Sterne

  // Belohnung: ein Tier für den Zoo
  lastSticker = awardSticker();
  el.rewardLabel.textContent = lastSticker.isNew ? "Neues Tier für deinen Dschungel!" : "Für deinen Dschungel!";
  el.rewardAnimal.textContent = lastSticker.animal;
  el.reward.classList.add("show");

  showScreen("win");
  playCheer();
  setTimeout(() => { confettiBurst(); confettiBurst(); }, 150);
  if (mode === "english")     setTimeout(() => speakEN("Well done! You are an English hero!"), 400);
  else if (mode === "shapes" || mode === "search") setTimeout(() => speakEN("Well done! Great job!"), 400);
  else                        setTimeout(() => speak("Super gemacht! Du bist ein " + title + "!"), 400);
}

/* ===================================================================
   KONFETTI (Canvas)
   =================================================================== */
const cv = byId("confetti");
const ctx = cv.getContext("2d");
let parts = [];
let rafRunning = false;
function resizeCanvas(){ cv.width = window.innerWidth; cv.height = window.innerHeight; }
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const COLORS = ["#ffcb05","#ff5252","#4aa3ff","#57b84a","#ff8f00","#ffffff","#b14aff"];
function confettiBurst(){
  for (let i = 0; i < 90; i++){
    parts.push({
      x: cv.width/2 + (Math.random()-0.5)*cv.width*0.5,
      y: cv.height*0.35 + (Math.random()-0.5)*60,
      vx: (Math.random()-0.5)*9, vy: Math.random()*-10 - 4,
      g: 0.32 + Math.random()*0.18, size: 6 + Math.random()*8,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.4, life: 0,
    });
  }
  if (!rafRunning){ rafRunning = true; requestAnimationFrame(tick); }
}
function tick(){
  ctx.clearRect(0,0,cv.width,cv.height);
  parts = parts.filter(p => p.life < 220 && p.y < cv.height + 40);
  parts.forEach(p => {
    p.life++; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vx *= 0.99;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6); ctx.restore();
  });
  if (parts.length > 0){ requestAnimationFrame(tick); } else { rafRunning = false; ctx.clearRect(0,0,cv.width,cv.height); }
}
